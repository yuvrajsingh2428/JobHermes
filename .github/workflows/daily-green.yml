name: Keep Github Calendar Green

on:
  schedule:
    - cron: '30 17 * * *' # Daily at 11:00 PM IST (17:30 UTC)
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  make-green:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Update activity log
        run: |
          mkdir -p .github
          echo "Daily activity check: $(date)" >> .github/daily-activity.txt

      - name: Commit and Push
        run: |
          git config --local user.email "75690761+yuvrajsingh2428@users.noreply.github.com"
          git config --local user.name "yuvrajsingh2428"
          git add .github/daily-activity.txt
          git commit -m "chore: daily activity update [skip ci]" || echo "No changes to commit"
          
          # Retry push up to 3 times if it fails
          for i in {1..3}; do
            echo "Push attempt $i..."
            if git push origin main; then
              echo "Push succeeded!"
              exit 0
            fi
            echo "Push failed. Waiting 10 seconds before retrying..."
            sleep 10
          done
          echo "All push attempts failed."
          exit 1
